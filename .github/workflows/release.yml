name: Release

# Build installers for macOS (Apple Silicon + Intel), Windows, and Linux,
# then publish them to a GitHub Release. Triggered when you push a version tag.
#
#   git tag v0.1.0
#   git push origin v0.1.0
#
# The release is created as a DRAFT — review the attached installers, then
# click "Publish release" so users can download them from the Releases page.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "WatchPost ${{ github.ref_name }}"
          releaseBody: |
            Download the installer for your platform below.

            **macOS:** open the `.dmg`, drag WatchPost to Applications. If Gatekeeper blocks it, right-click → Open.
            **Windows:** run the `.msi` or `.exe`; click through SmartScreen if prompted.
            **Linux:** use the `.deb`, `.AppImage`, or `.rpm` for your distro.

            See [RELEASE.md](https://github.com/${{ github.repository }}/blob/main/wiki/RELEASE.md) for details.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}
