name: Release

# Build installers for macOS (Apple Silicon + Intel) and Windows,
# then publish them to a GitHub Release. Triggered when you push a version tag.
#
#   git tag v0.1.0
#   git push origin v0.1.0
#
# The release is created as a DRAFT — review the attached installers, then
# click "Publish release" so users can download them from the Releases page.
#
# Before pushing a tag, run locally:  npm run release:check

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon — native on macos-latest (arm64 runner).
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust-target: aarch64-apple-darwin
          # Intel Mac — macos-13 was retired Dec 2025; use macos-15-intel instead.
          - platform: macos-15-intel
            args: ""
            rust-target: ""
          - platform: windows-latest
            args: ""
            rust-target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust cross-target
        if: matrix.rust-target != ''
        run: rustup target add ${{ matrix.rust-target }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "WatchPost ${{ github.ref_name }}"
          releaseBody: |
            Download the installer for your platform below.

            **macOS:** open the `.dmg`, drag WatchPost to Applications. If Gatekeeper blocks it, right-click → Open.
            **Windows:** run the `.msi` or `.exe`; click through SmartScreen if prompted.

            See [RELEASE.md](https://github.com/${{ github.repository }}/blob/main/wiki/RELEASE.md) for details.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}
