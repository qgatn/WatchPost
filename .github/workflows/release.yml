name: Release

# Build a Windows installer and publish it to a GitHub Release when you push a version tag.
# macOS jobs can be added later when signing/notarization is set up.
#
#   git tag v0.2.1
#   git push origin v0.2.1
#
# The release is created as a DRAFT — review the attached installer, then publish it.
# The git tag is the source of truth: CI syncs version into manifests before building.
#
# Before pushing a tag, run locally:  npm run release:check

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Sync version from git tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: node scripts/sync-version.mjs "${{ github.ref_name }}"

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "WatchPost ${{ github.ref_name }}"
          releaseBody: |
            Download the Windows installer below.

            **Windows:** run the `.msi` or `.exe`; click through SmartScreen if prompted.

            See [RELEASE.md](https://github.com/${{ github.repository }}/blob/main/wiki/RELEASE.md) for details.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false
